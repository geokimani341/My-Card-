<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>George Kimani</title>
<style>
  :root {
    --ink: #15171a;
    --paper: #f6f5f1;
    --line: #d8d5cb;
    --accent: #c8ff4d;
    --accent-dim: #aee03f;
    --muted: #6b6f76;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: var(--ink);
    border: 1px solid #2a2d31;
    border-radius: 18px;
    padding: 40px 32px 32px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: var(--accent);
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 18px;
  }

  h1 {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.05;
    color: var(--paper);
    margin-bottom: 28px;
  }

  .divider {
    height: 1px;
    background: #2a2d31;
    margin-bottom: 28px;
  }

  .field {
    margin-bottom: 20px;
  }

  .field-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .field-value {
    font-size: 17px;
    color: var(--paper);
    text-decoration: none;
    word-break: break-word;
  }

  .field-value:active {
    color: var(--accent);
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 32px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 15px 18px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: transform 0.08s ease, opacity 0.15s ease;
    font-family: inherit;
  }

  .btn:active {
    transform: scale(0.98);
  }

  .btn-primary {
    background: var(--accent);
    color: var(--ink);
  }

  .btn-primary:active {
    background: var(--accent-dim);
  }

  .btn-secondary {
    background: transparent;
    color: var(--paper);
    border: 1px solid #3a3d42;
  }

  .footer-mark {
    margin-top: 28px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="eyebrow">Contact</div>
    <h1>George<br>Kimani</h1>

    <div class="divider"></div>

    <div class="field">
      <div class="field-label">Phone</div>
      <a class="field-value" href="tel:+19133000900">(913) 300-0900</a>
    </div>

    <div class="field">
      <div class="field-label">Email</div>
      <a class="field-value" href="mailto:george@georgekimani.com">george@georgekimani.com</a>
    </div>

    <div class="actions">
      <a class="btn btn-primary" href="George_Kimani.vcf" download>
        Save Contact
      </a>
      <a class="btn btn-secondary" href="tel:+19133000900">
        Call
      </a>
      <a class="btn btn-secondary" href="mailto:george@georgekimani.com">
        Email
      </a>
    </div>

    <div class="footer-mark">tap-to-save · georgekimani.com</div>
  </div>

</body>
</html>
